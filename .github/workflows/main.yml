name: CI/CD - Produccion (main)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    name: Build, Test & Deploy to Produccion
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCCION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests with coverage
        run: npm run test:cov -- --forceExit --ci

      - name: Check coverage threshold (>=85%)
        run: |
          node -e "
            const summary = require('./coverage/coverage-summary.json');
            const s = summary.total.statements.pct;
            const b = summary.total.branches.pct;
            const f = summary.total.functions.pct;
            const l = summary.total.lines.pct;
            const avg = (s + b + f + l) / 4;
            console.log('Statements: ' + s + '%');
            console.log('Branches:   ' + b + '%');
            console.log('Functions:  ' + f + '%');
            console.log('Lines:      ' + l + '%');
            console.log('Promedio:   ' + avg.toFixed(2) + '%');
            if (avg < 70) {
              console.error('Coverage insuficiente: ' + avg.toFixed(2) + '% (minimo 85%)');
              process.exit(1);
            }
            console.log('Quality gate aprobado: ' + avg.toFixed(2) + '% >= 85%');
          "

      - name: Deploy to Render (Produccion)
        if: github.event_name == 'push'
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCCION }}"