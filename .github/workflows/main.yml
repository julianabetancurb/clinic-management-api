name: CI/CD - Producción (main)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    name: Build, Test & Deploy to Producción
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCCION }}

    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Generar cliente de Prisma
      - name: Generate Prisma client
        run: npx prisma generate

      # 5. Ejecutar pruebas con cobertura
      - name: Run tests with coverage
        run: npm run test:cov -- --forceExit

      # 6. Validar cobertura mínima (quality gate: ≥85%)
      - name: Check coverage threshold (≥85%)
        run: |
          LINES=$(cat coverage/coverage-summary.json | node -e "
            const fs = require('fs');
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            console.log(data.total.lines.pct);
          ")
          echo "Coverage de líneas: $LINES%"
          node -e "
            const pct = $LINES;
            if (pct < 85) {
              console.error('❌ Coverage insuficiente: ' + pct + '% (mínimo 85% para producción)');
              process.exit(1);
            }
            console.log('✅ Coverage OK: ' + pct + '%');
          "

      # 7. Deploy a Render (solo en push, no en PR)
      - name: Deploy to Render (Producción)
        if: github.event_name == 'push'
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_PRODUCCION }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            | grep -q '"id"' && echo "✅ Deploy iniciado en Render (Producción)" || (echo "❌ Error al iniciar deploy" && exit 1)
