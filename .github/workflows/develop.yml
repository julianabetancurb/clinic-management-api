name: CI/CD - Pruebas (develop)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test-and-deploy:
    name: Build, Test & Deploy to Pruebas
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PRUEBAS }}

    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Generar cliente de Prisma
      - name: Generate Prisma client
        run: npx prisma generate

      # 5. Ejecutar pruebas con cobertura
      - name: Run tests with coverage
        run: npm run test:cov -- --forceExit

      # 6. Validar cobertura mínima (quality gate: ≥60%)
      - name: Check coverage threshold (≥60%)
        run: |
          LINES=$(cat coverage/coverage-summary.json | node -e "
            const fs = require('fs');
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            console.log(data.total.lines.pct);
          ")
          echo "Coverage de líneas: $LINES%"
          node -e "
            const pct = $LINES;
            if (pct < 60) {
              console.error('❌ Coverage insuficiente: ' + pct + '% (mínimo 60%)');
              process.exit(1);
            }
            console.log('✅ Coverage OK: ' + pct + '%');
          "

      # 7. Deploy a Render (solo en push, no en PR)
      - name: 🚀 Deploy to Render (Pruebas)
        if: github.event_name == 'push'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_PRUEBAS }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/render_response.json -w "%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/render_response.json

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Error al iniciar deploy en Render (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "✅ Deploy iniciado correctamente en ambiente de Pruebas"
